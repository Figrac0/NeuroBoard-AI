# ~/.tmux.conf — harness orchestration: runs survive reboots and SSH timeouts.
# Install plugin manager first:  git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then inside tmux press:  prefix + I   (capital i) to install the plugins below.

set -g mouse on
set -g history-limit 50000
setw -g mode-keys vi

# --- Plugins ---------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore full tmux environment
set -g @plugin 'tmux-plugins/tmux-continuum'   # continuous auto-save + auto-restore

# --- Persistence across reboot / SSH timeout -------------------------------
set -g @resurrect-capture-pane-contents 'on'
# Relaunch the agent processes themselves on restore (not just the panes):
set -g @resurrect-processes 'claude opencode "node" ssh'
set -g @continuum-save-interval '5'            # auto-save every 5 minutes
set -g @continuum-restore 'on'                 # auto-restore the session when tmux starts

# Manual controls if needed:  prefix + Ctrl-s (save),  prefix + Ctrl-r (restore)

# Keep this line last:
run '~/.tmux/plugins/tpm/tpm'
